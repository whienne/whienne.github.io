<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostLink</title>
    <script src="https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js" defer></script>
    <script type="module">
        import * as BareMux from "https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux/dist/index.mjs";
        window.BareMux = BareMux;
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --sidebar-bg: var(--bg);
            --accent: #6ecbff;
            --accent-glow: rgba(110, 203, 255, 0.3);
            --text-primary: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(110, 203, 255, 0.08);
            --font: 'Courier New', monospace;
            --card-bg: rgba(255, 255, 255, 0.03);
            --input-bg: rgba(255, 255, 255, 0.05);
            --bg-image: none;
            --bg-blur: 0px;
            --bg-brightness: 100%;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(var(--bg-blur)) brightness(var(--bg-brightness));
            z-index: -1;
            pointer-events: none;
        }
        /* ════════════════════════════════════════
           PROXY BROWSER — integrated CSS
           .settings-card/.settings-header renamed to
           .proxy-wisp-card/.proxy-wisp-header to avoid
           conflicts with GhostLink's own settings CSS.
           ════════════════════════════════════════ */

        /* ── BROWSER LAYOUT ── */
        .browser-container {
          width: 100%;
          height: 100%;
          display: flex;
          flex-direction: column;
          background: var(--bg);
          overflow: hidden;
          min-width: 0;
        }

        /* ── BROWSER TABS ROW ── */
        .browser-tabs {
          display: flex;
          align-items: flex-end;
          padding: 6px 16px 0;
          gap: 4px;
          background: var(--bg);
          border-bottom: 1px solid var(--border);
          flex-shrink: 0;
          overflow: hidden;
          min-height: 44px;
          box-sizing: border-box;
        }

        .tab {
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 8px 8px 8px 12px;
          flex: 1 1 160px;
          min-width: 40px;
          max-width: 200px;
          background: transparent;
          border: 1px solid var(--border);
          border-bottom: none;
          border-radius: 8px 8px 0 0;
          cursor: pointer;
          transition: background 0.15s, border-color 0.15s;
          font-family: var(--font);
          position: relative;
          user-select: none;
          overflow: hidden;
        }
        .tab:hover {
          background: rgba(255, 255, 255, 0.05);
          border-color: var(--border);
        }
        .tab.active {
          background: rgba(255, 255, 255, 0.05);
          border-color: var(--accent);
          border-bottom-color: var(--bg);
        }
        .tab.drag-over {
          border-color: var(--accent);
          opacity: 0.7;
        }
        .tab.active::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 2px;
        }
        .tab.active::after {
          content: '';
          position: absolute;
          bottom: -1px;
          left: 0;
          right: 0;
          height: 1px;
          background: var(--bg);
        }
        .tab-favicon {
          width: 18px;
          height: 18px;
          border-radius: 3px;
          flex-shrink: 0;
        }
        .tab-title {
          flex: 1;
          font-size: 0.85rem;
          font-family: var(--font);
          color: var(--text-dim);
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .tab.active .tab-title {
          color: var(--accent);
          text-shadow: 0 0 10px var(--accent-glow);
        }
        .tab-close {
          font-size: 16px;
          color: var(--text-dim);
          cursor: pointer;
          padding: 3px 6px;
          border-radius: 4px;
          transition: 0.2s;
          line-height: 1;
          flex-shrink: 0;
        }
        .tab-close:hover {
          background: rgba(255, 68, 68, 0.15);
          color: #ff4444;
        }
        .new-tab {
          width: 30px;
          height: 30px;
          background: transparent;
          border: 1px solid var(--border);
          color: var(--text-dim);
          border-radius: 6px;
          cursor: pointer;
          transition: 0.2s;
          font-size: 16px;
          flex-shrink: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: var(--font);
          align-self: center;
          margin-bottom: 4px;
        }
        .new-tab svg {
          stroke: var(--text-dim);
          transition: stroke 0.2s;
          pointer-events: none;
        }
        .new-tab:disabled {
          opacity: 0.25;
          cursor: not-allowed;
          pointer-events: none;
        }
        .new-tab:hover {
          border-color: var(--accent);
          color: var(--accent);
          box-shadow: 0 0 10px var(--accent-glow);
        }
        .new-tab:hover svg {
          stroke: var(--accent);
        }

        /* ── NAV BAR ── */
        .proxy-nav {
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 10px 16px;
          background: var(--bg);
          border-bottom: 1px solid var(--border);
          flex-shrink: 0;
        }
        .proxy-nav button {
          display: flex;
          align-items: center;
          justify-content: center;
          width: 30px;
          height: 30px;
          background: transparent;
          border: 1px solid var(--border);
          border-radius: 6px;
          color: var(--text-dim);
          cursor: pointer;
          transition: 0.2s;
          font-size: 13px;
          font-family: var(--font);
          flex-shrink: 0;
        }
        .proxy-nav button svg {
          stroke: var(--text-dim);
          transition: stroke 0.2s;
          pointer-events: none;
        }
        .proxy-nav button:hover svg {
          stroke: var(--accent);
        }
        .proxy-nav button:hover {
          border-color: var(--accent);
          color: var(--accent);
          box-shadow: 0 0 10px var(--accent-glow);
        }

        /* ── ADDRESS BAR ── */
        .address-wrapper {
          flex: 1;
          position: relative;
          display: flex;
          align-items: center;
        }
        input.bar {
          width: 100%;
          height: 36px;
          padding: 0 40px 0 16px;
          background: var(--input-bg);
          border: 1px solid var(--border);
          border-radius: 12px;
          color: var(--text-primary);
          font-size: 1rem;
          font-family: var(--font);
          outline: none;
          transition: 0.2s;
          backdrop-filter: blur(5px);
          color-scheme: dark;
        }
        input.bar:focus {
          border-color: var(--accent);
          background: rgba(255, 255, 255, 0.08);
          box-shadow: 0 0 10px var(--accent-glow);
        }
        input.bar::placeholder {
          color: var(--text-dim);
          opacity: 0.5;
        }
        #home-btn-nav {
          position: absolute;
          right: 6px;
          width: 30px;
          height: 30px;
          background: transparent;
          border: none;
          color: var(--text-dim);
          border-radius: 6px;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 13px;
          padding: 0;
          transition: 0.2s;
        }
        #home-btn-nav:hover { color: var(--accent); }

        /* ── LOADING BAR ── */
        .loading-bar-container {
          height: 2px;
          background: transparent;
          flex-shrink: 0;
        }
        .loading-bar {
          height: 100%;
          width: 0%;
          background: var(--accent);
          box-shadow: 0 0 8px var(--accent-glow);
          transition: width 0.2s ease, opacity 0.15s;
        }

        /* ── IFRAME CONTAINER ── */
        .iframe-container {
          flex: 1;
          position: relative;
          background: var(--bg);
          overflow: hidden;
        }
        .iframe-container iframe {
          width: 100%;
          height: 100%;
          border: none;
          position: absolute;
          top: 0;
          left: 0;
        }
        .iframe-container iframe.hidden { display: none; }
        .iframe-container iframe.loading {
          filter: blur(12px);
          transition: filter 0.4s ease;
        }

        /* ── MESSAGE / LOADING OVERLAY ── */
        .message-container {
          display: flex;
          align-items: center;
          justify-content: center;
          position: absolute;
          inset: 0;
          z-index: 9999;
          background: rgba(0, 0, 0, 0.88);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          animation: fadeIn 0.4s ease;
        }
        .message-content {
          max-width: 380px;
          width: 90%;
          padding: 32px;
          background: var(--card-bg);
          border: 1px solid var(--accent);
          border-radius: 16px;
          box-shadow: 0 0 60px var(--accent-glow), 0 0 20px rgba(0,0,0,0.8);
          text-align: center;
          backdrop-filter: blur(10px);
        }
        .message-content h1 {
          font-family: var(--font);
          font-size: 1.2rem;
          font-weight: bold;
          color: var(--accent);
          text-transform: uppercase;
          letter-spacing: 1px;
          margin-bottom: 10px;
          text-shadow: 0 0 10px var(--accent-glow);
        }
        .message-content p {
          font-family: var(--font);
          color: var(--text-dim);
          font-size: 0.85rem;
          word-break: break-all;
          line-height: 1.7;
        }
        .spinner {
          border: 2px solid var(--border);
          border-top-color: var(--accent);
          border-radius: 50%;
          width: 26px;
          height: 26px;
          animation: spin 0.8s linear infinite;
          margin: 0 auto 20px;
          box-shadow: 0 0 10px var(--accent-glow);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tab-spinner {
          width: 15px;
          height: 15px;
          border: 2px solid var(--border);
          border-top-color: var(--accent);
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
          flex-shrink: 0;
        }
        #skip-btn, #retry-btn {
          display: none;
          margin-top: 20px;
          padding: 8px 10px;
          background: transparent;
          border: 1px solid var(--border);
          border-radius: 6px;
          color: var(--text-dim);
          cursor: pointer;
          font-family: var(--font);
          font-size: 0.75rem;
          letter-spacing: 1px;
          text-transform: uppercase;
          transition: 0.2s;
        }
        #skip-btn:hover, #retry-btn:hover {
          border-color: var(--accent);
          color: var(--accent);
          box-shadow: 0 0 8px var(--accent-glow);
        }

        /* ── PROXY WISP SETTINGS MODAL ── */
        .wisp-settings-modal {
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.88);
          backdrop-filter: blur(12px);
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          animation: fadeIn 0.2s ease;
        }
        .wisp-settings-modal.hidden { display: none; }
        .proxy-wisp-card {
          background: var(--card-bg);
          width: 420px;
          max-width: 92vw;
          max-height: 82vh;
          border-radius: 16px;
          border: 1px solid var(--accent);
          box-shadow: 0 0 60px var(--accent-glow), 0 0 20px rgba(0,0,0,0.8);
          display: flex;
          flex-direction: column;
          overflow: hidden;
          backdrop-filter: blur(10px);
        }
        .proxy-wisp-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 18px 22px;
          border-bottom: 1px solid var(--border);
          flex-shrink: 0;
        }
        .proxy-wisp-header h2 {
          font-family: var(--font);
          font-size: 1.2rem;
          font-weight: bold;
          color: var(--accent);
          text-transform: uppercase;
          letter-spacing: 1px;
          text-shadow: 0 0 10px var(--accent-glow);
          display: flex;
          align-items: center;
          gap: 10px;
          margin: 0;
        }
        .close-btn {
          width: 30px;
          height: 30px;
          background: transparent;
          border: 1px solid var(--border);
          color: var(--text-dim);
          border-radius: 6px;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 13px;
          transition: 0.2s;
        }
        .close-btn:hover {
          border-color: var(--accent);
          color: var(--accent);
          box-shadow: 0 0 8px var(--accent-glow);
        }
        .settings-content {
          padding: 20px;
          overflow-y: auto;
          flex: 1;
        }
        .section-title {
          font-family: var(--font);
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 1px;
          color: var(--text-dim);
          margin-bottom: 12px;
          display: flex;
          align-items: center;
          gap: 8px;
        }
        .server-list {
          display: flex;
          flex-direction: column;
          gap: 6px;
          margin-bottom: 20px;
        }
        .wisp-option {
          display: flex;
          flex-direction: column;
          gap: 4px;
          padding: 15px;
          background: var(--card-bg);
          border: 1px solid var(--border);
          border-radius: 12px;
          cursor: pointer;
          transition: 0.2s;
          backdrop-filter: blur(12px) saturate(180%);
          font-size: 11px;
          color: var(--text-dim);
          line-height: 2;
        }
        .wisp-option:hover {
          border-color: var(--accent);
          background: rgba(255, 255, 255, 0.05);
        }
        .wisp-option.active {
          border-color: var(--accent);
          background: rgba(255, 255, 255, 0.05);
          box-shadow: 0 0 15px var(--accent-glow);
        }
        .wisp-option-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
        }
        .wisp-option-name {
          font-family: var(--font);
          font-size: 0.85rem;
          font-weight: bold;
          color: var(--text-primary);
          display: flex;
          align-items: center;
        }
        .wisp-option.active .wisp-option-name { color: var(--accent); }
        .wisp-option-url {
          font-family: var(--font);
          font-size: 0.72rem;
          color: var(--text-dim);
        }
        .server-status {
          display: flex;
          align-items: center;
          gap: 6px;
        }
        .ping-text {
          font-family: var(--font);
          font-size: 0.72rem;
          color: var(--text-dim);
        }
        .status-indicator {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: var(--text-dim);
          flex-shrink: 0;
        }
        .status-indicator.status-success {
          background: #22c55e;
          box-shadow: 0 0 5px rgba(34,197,94,0.5);
        }
        .status-indicator.status-error {
          background: #ff4444;
          box-shadow: 0 0 5px rgba(255,68,68,0.5);
        }
        .custom-input-group {
          display: flex;
          gap: 8px;
        }
        .custom-input-group input {
          flex: 1;
          padding: 12px;
          background: var(--input-bg);
          border: 1px solid var(--border);
          border-radius: 8px;
          color: var(--text-primary);
          font-family: var(--font);
          font-size: 0.85rem;
          outline: none;
          transition: 0.2s;
          backdrop-filter: blur(5px);
          color-scheme: dark;
        }
        .custom-input-group input:focus {
          border-color: var(--accent);
          background: rgba(255, 255, 255, 0.08);
        }
        .custom-input-group input::placeholder {
          color: var(--text-dim);
          opacity: 0.5;
        }
        .custom-input-group button {
          padding: 14px 32px;
          background: var(--accent);
          border: none;
          border-radius: 8px;
          color: #000;
          cursor: pointer;
          font-family: var(--font);
          font-weight: bold;
          font-size: 0.75rem;
          letter-spacing: 1px;
          text-transform: uppercase;
          transition: 0.2s;
        }
        .custom-input-group button:hover {
          box-shadow: 0 0 10px var(--accent-glow);
        }
        .settings-footer {
          padding: 14px 22px;
          border-top: 1px solid var(--border);
          color: var(--text-dim);
          font-family: var(--font);
          font-size: 0.8rem;
          letter-spacing: 1px;
          text-transform: uppercase;
          flex-shrink: 0;
        }
        .delete-wisp-btn {
          background: transparent;
          border: 1px solid rgba(255, 68, 68, 0.4);
          color: #ff4444;
          border-radius: 6px;
          cursor: pointer;
          font-family: var(--font);
          font-size: 0.75rem;
          padding: 8px 10px;
          transition: 0.2s;
          margin-left: 6px;
        }
        .delete-wisp-btn:hover { background: rgba(255, 68, 68, 0.15); }
        .toggle-switch {
          width: 36px;
          height: 18px;
          background: var(--border);
          border-radius: 9px;
          position: relative;
          cursor: pointer;
          transition: 0.2s;
          flex-shrink: 0;
          border: 1px solid var(--border);
        }
        .toggle-switch.active {
          background: rgba(110, 203, 255, 0.25);
          border-color: var(--accent);
          box-shadow: 0 0 8px var(--accent-glow);
        }
        .toggle-knob {
          width: 12px;
          height: 12px;
          background: var(--text-dim);
          border-radius: 50%;
          position: absolute;
          top: 2px;
          left: 2px;
          transition: 0.2s;
        }
        .toggle-switch.active .toggle-knob {
          transform: translateX(18px);
          background: var(--accent);
        }

        /* ── PROXY SECTION LAYOUT ── */
        #proxy-content {
          padding: 0 !important;
          overflow: hidden !important;
          flex-direction: column !important;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #proxy-app {
          display: flex;
          flex: 1;
          width: 100%;
          height: 100%;
          overflow: hidden;
          min-width: 0;
        }
        /* --- END PROXY CSS --- */

        /* --- STANDALONE LAYOUT OVERRIDES --- */
        body { display: flex; flex-direction: column; }
        #proxy-content {
          display: flex !important;
          flex: 1;
          width: 100%;
          height: 100vh;
          margin: 0 !important;
        }
        #proxy-app {
          flex: 1;
          height: 100%;
        }
        /* --- END STANDALONE LAYOUT OVERRIDES --- */

    </style>
</head>
<body>

        <!-- PROXY SECTION (native — full index.html browser integrated) -->
        <section id="proxy-content" class="view-section">
            <div id="proxy-app"></div>
        </section>

        <!-- PROXY WISP SETTINGS MODAL -->
        <div class="wisp-settings-modal hidden" id="wisp-settings-modal">
            <div class="proxy-wisp-card">
                <div class="proxy-wisp-header">
                    <h2><span style="font-size:1.1rem;line-height:1">◈</span>Proxy Settings</h2>
                    <button class="close-btn" id="close-wisp-modal"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="settings-content" id="settings-tab-servers">
                    <div class="section-title"><i class="fa-solid fa-server"></i>Select Server</div>
                    <div class="server-list" id="server-list"></div>
                    <div class="section-title"><i class="fa-solid fa-plug"></i>Custom Server</div>
                    <div class="custom-input-group">
                        <input type="text" id="custom-wisp-input" placeholder="wss://your-server.com/wisp/" spellcheck="false">
                        <button id="save-custom-wisp"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <div class="settings-footer">
                    <i class="fa-solid fa-bolt" style="color:var(--accent);margin-right:6px"></i>Lower ping = faster browsing
                </div>
            </div>
        </div>

        <!-- NT.HTML INLINED as a template (used to create Blob URL at runtime) -->
        <template id="nt-html-template"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab | GhostLink</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg:            var(--nt-bg,             #000000);
      --accent:        var(--nt-accent,         #6ecbff);
      --accent-glow:   var(--nt-accent-glow,    rgba(110, 203, 255, 0.3));
      --text-primary:  var(--nt-text-primary,   #ffffff);
      --text-dim:      var(--nt-text-dim,       #94a3b8);
      --border:        var(--nt-border,         rgba(110, 203, 255, 0.08));
      --card-bg:       var(--nt-card-bg,        rgba(255, 255, 255, 0.03));
      --input-bg:      var(--nt-input-bg,       rgba(255, 255, 255, 0.05));
      --font:          var(--nt-font,           'Courier New', monospace);
      --bg-image:      var(--nt-bg-image,       none);
      --bg-blur:       var(--nt-bg-blur,        0px);
      --bg-brightness: var(--nt-bg-brightness,  100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar        { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track  { background: transparent; }
    ::-webkit-scrollbar-thumb  { background: var(--accent); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    * { scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background-color: var(--bg);
      font-family: var(--font);
      color: var(--text-primary);
      position: relative;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: var(--bg-image, none);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      filter: blur(var(--bg-blur, 0px)) brightness(var(--bg-brightness, 100%));
      z-index: -1;
      pointer-events: none;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 560px;
      padding: 20px;
      animation: fadeIn 0.4s ease;
    }
    .hero-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
      animation: fadeIn 0.4s ease;
      margin-bottom: 32px;
    }
    .gl-logo {
      font-family: var(--font);
      font-size: clamp(2.5rem, 6vw, 5rem);
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent-glow);
      margin-bottom: 4px;
      letter-spacing: 2px;
    }
    .gl-title {
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 1.1;
      margin-bottom: 24px;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }
    .search-wrap { width: 100%; margin-bottom: 36px; }
    .search-box {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 10px 16px;
      border-radius: 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(5px);
      transition: 0.2s;
      color-scheme: dark;
    }
    .search-box:focus-within {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 15px var(--accent-glow);
    }
    .search-icon {
      flex-shrink: 0;
      color: var(--accent);
      display: flex;
      align-items: center;
      transition: 0.2s;
      opacity: 0.7;
    }
    .search-box:focus-within .search-icon { opacity: 1; }
    .search-icon svg {
      width: 15px;
      height: 15px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: var(--font);
      color-scheme: dark;
    }
    .search-box input::placeholder { color: var(--text-dim); opacity: 0.5; }
    .search-box select {
      background: transparent;
      color: var(--text-dim);
      border: none;
      padding: 2px 4px;
      font-family: var(--font);
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      outline: none;
      cursor: pointer;
      transition: 0.2s;
      color-scheme: dark;
      appearance: none;
      -webkit-appearance: none;
    }
    .search-box select:hover { color: var(--accent); }
    .search-box select:focus { color: var(--accent); }
    .search-box select option          { background: var(--bg); color: var(--text-primary); }
    .search-box select option:checked  { background: var(--accent); color: #000; }
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
      width: 100%;
    }
    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
      animation: fadeIn 0.4s ease both;
    }
    .shortcut-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      backdrop-filter: blur(10px);
    }
    .shortcut:hover .shortcut-icon {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 15px var(--accent-glow);
    }
    .shortcut-icon img {
      width: 24px;
      height: 24px;
      opacity: 0.7;
      transition: 0.2s;
    }
    .shortcut:hover .shortcut-icon img { opacity: 1; }
    .shortcut-svg {
      width: 24px;
      height: 24px;
      fill: var(--text-dim);
      stroke: none;
      transition: fill 0.2s;
    }
    .shortcut:hover .shortcut-svg { fill: var(--accent); }
    .shortcut-icon i { color: var(--accent); font-size: 18px; }
    .shortcut-label {
      font-family: var(--font);
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: 0.2s;
      text-align: center;
    }
    .shortcut:hover .shortcut-label { color: var(--accent); }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fadeIn 0.4s ease;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--card-bg);
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 25px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 60px var(--accent-glow), 0 0 20px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 20px;
    }
    .modal-header h2 {
      font-family: var(--font);
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 0 10px var(--accent-glow);
      margin: 0;
    }
    .modal-close {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 30px;
      height: 30px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
    }
    .modal-close:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .modal label {
      display: block;
      font-family: var(--font);
      font-size: 0.8rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .modal input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 0.85rem;
      outline: none;
      transition: 0.2s;
      margin-bottom: 20px;
      backdrop-filter: blur(5px);
      color-scheme: dark;
    }
    .modal input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
    }
    .modal input::placeholder { color: var(--text-dim); opacity: 0.5; }
    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: 0.2s;
    }
    .btn-cancel:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .btn-save {
      background: var(--accent);
      border: none;
      color: #000;
      border-radius: 8px;
      padding: 14px 32px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.75rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: 0.2s;
    }
    .btn-save:hover { box-shadow: 0 0 10px var(--accent-glow); }
    .nav-loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .nav-loader.show { display: flex; }
    .spinner {
      width: 26px;
      height: 26px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 10px var(--accent-glow);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

    <div class="spinner"></div>
  </div>

    <div class="hero-block">
      <div class="gl-logo">◈</div>
      <h1 class="gl-title">GhostLink</h1>
    </div>

      <div class="search-box">
        <span class="search-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="7"/>
            <line x1="16.5" y1="16.5" x2="22" y2="22"/>

        <input type="text" id="searchInput" placeholder="Search or enter URL..." autocomplete="off" spellcheck="false">

    <div class="shortcuts" id="shortcuts"></div>
  </div>
  <div class="modal-overlay hidden" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Shortcut</h2>
        <button class="modal-close" id="cancelAdd"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <label>Label</label>
      <input type="text" id="newLabel" placeholder="YouTube" spellcheck="false">
      <label>URL</label>
      <input type="text" id="newUrl" placeholder="https://youtube.com" spellcheck="false">
      <div class="modal-footer">
        <button class="btn-cancel" id="cancelAdd2">Cancel</button>

      </div>

  <script>
    // Receive live theme updates from the parent page
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'GHOSTLINK_NT_THEME') {
        const t = e.data.theme;
        const r = document.documentElement;
        if (t.bg)            r.style.setProperty('--bg',            t.bg);
        if (t.accent)        r.style.setProperty('--accent',        t.accent);
        if (t.accentGlow)    r.style.setProperty('--accent-glow',   t.accentGlow);
        if (t.textPrimary)   r.style.setProperty('--text-primary',  t.textPrimary);
        if (t.textDim)       r.style.setProperty('--text-dim',      t.textDim);
        if (t.border)        r.style.setProperty('--border',        t.border);
        if (t.cardBg)        r.style.setProperty('--card-bg',       t.cardBg);
        if (t.inputBg)       r.style.setProperty('--input-bg',      t.inputBg);
        if (t.font)          r.style.setProperty('--font',          t.font);

        document.body.style.color = t.textPrimary || '';
        document.body.style.fontFamily = t.font || '';
      }
    });
    // Tell the parent we are ready so it can push the current theme immediately
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'GHOSTLINK_NT_READY' }, '*');
    }

    function navigate(url) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'navigate', url }, '*');
      } else {
        document.getElementById('loader').classList.add('show');
        window.location.href = url;
      }
    }
    (function() {
      const saved = localStorage.getItem('gl_search_engine');
      const sel = document.getElementById('engine');
      if (saved) {
        const opt = [...sel.options].find(o => o.value === saved);
        if (opt) sel.value = saved;
      }
      sel.addEventListener('change', () => localStorage.setItem('gl_search_engine', sel.value));
    })();
    document.getElementById('searchForm').onsubmit = e => {

    function getShortcuts() {
      try { return JSON.parse(localStorage.getItem('gl_shortcuts') || 'null') || DEFAULT_SHORTCUTS; }
      catch { return DEFAULT_SHORTCUTS; }
    }
    function saveShortcuts(list) { localStorage.setItem('gl_shortcuts', JSON.stringify(list)); }
    function renderShortcuts() {
      const container = document.getElementById('shortcuts');
      container.innerHTML = '';
      getShortcuts().forEach((s, i) => {
        const el = document.createElement('div');
        el.className = 'shortcut';
        el.style.animationDelay = (i * 0.04 + 0.04) + 's';
        // Use inline SVG if available (default shortcuts), else fall back to <img> for user-added favicons
        const iconHtml = s.svg
          ? `<svg viewBox="${s.viewBox || '0 0 24 24'}" fill="currentColor" stroke="none" class="shortcut-svg">${s.svg}</svg>`
          : `<img src="${s.icon}" onerror="this.style.display='none'">`;
        el.innerHTML = `
          <div class="shortcut-icon">${iconHtml}</div>
          <span class="shortcut-label">${s.label}</span>`;
        el.onclick = () => navigate(s.url);
        container.appendChild(el);
      });
    }
    renderShortcuts();
    const closeModal = () => document.getElementById('addModal').classList.add('hidden');
    document.getElementById('cancelAdd').onclick = closeModal;
    document.getElementById('cancelAdd2').onclick = closeModal;
    document.getElementById('addModal').onclick = e => {
      if (e.target === document.getElementById('addModal')) closeModal();
    };
    document.getElementById('confirmAdd').onclick = () => {
      const label = document.getElementById('newLabel').value.trim();
      let url = document.getElementById('newUrl').value.trim();

      if (!/^https?:\/\//.test(url)) url = 'https://' + url;

    <script>
        function sendThemeToIframe() {
            const iframe = document.getElementById('app-frame');
            if (!iframe || !iframe.contentWindow) return;

                accent: styles.getPropertyValue('--accent').trim(),
                bg: styles.getPropertyValue('--bg').trim(),
                font: styles.getPropertyValue('--font').trim()
            };

            iframe.contentWindow.postMessage({
                type: 'GHOSTLINK_THEME_DATA',
                theme: theme
            }, '*');
        }

        function sendThemeToNtTabs() {
            if (typeof tabs === 'undefined' || !tabs.length) return;
            const s = getComputedStyle(document.documentElement);
            const g = (v) => s.getPropertyValue(v).trim();
            const theme = {
                bg:            g('--bg'),
                accent:        g('--accent'),
                accentGlow:    g('--accent-glow'),
                textPrimary:   g('--text-primary'),
                textDim:       g('--text-dim'),
                border:        g('--border'),
                cardBg:        g('--card-bg'),
                inputBg:       g('--input-bg'),
                font:          g('--font'),
                bgImage:       g('--bg-image'),
                bgBlur:        g('--bg-blur'),
                bgBrightness:  g('--bg-brightness'),
            };
            tabs.forEach(tab => {
                const isNt = !tab.url || tab.url === 'NT.html' || (tab.url && tab.url.startsWith('blob:'));
                if (isNt && tab.frame && tab.frame.frame && tab.frame.frame.contentWindow) {
                    try { tab.frame.frame.contentWindow.postMessage({ type: 'GHOSTLINK_NT_THEME', theme }, '*'); } catch(e) {}
                }
            });
        }

        window.addEventListener('message', (event) => {
            if (event.data.type === 'GHOSTLINK_QUERY_THEME') {
                sendThemeToIframe();

        let proxyBrowserInitialized = false;

        async function fetchWispServers() {
            try {
                const res = await fetch("https://cdn.jsdelivr.net/gh/virtuan4-max/ghostlinkhub@main/proxy/wisps.html");
                const text = await res.text();
                const match = text.match(/const\s+WISP_SERVERS\s*=\s*(\[[\s\S]*?\]);/);
                if (match) {
                    WISP_SERVERS = (new Function('return ' + match[1]))();
                }
            } catch (e) {
                console.warn("Failed to fetch wisp server list:", e);
            }
            if (!WISP_SERVERS.length) {
                WISP_SERVERS = [{ name: "Wisp 1", url: "wss://i-ready.math.bostoncareercounselor.com/wisp/" }];
            }
            if (!DEFAULT_WISP) DEFAULT_WISP = WISP_SERVERS[0].url;
            if (!localStorage.getItem("proxServer")) {
                localStorage.setItem("proxServer", DEFAULT_WISP);
            }
        }

        function getAllWispServers() {
            const customWisps = getStoredWisps();
            return [...WISP_SERVERS, ...customWisps];
        }


        async function pingWispServer(url, timeout = 2000) {
            return new Promise((resolve) => {
                const start = Date.now();
                try {
                    const ws = new WebSocket(url);
                    const timer = setTimeout(() => {
                        try { ws.close(); } catch {}
                        resolve({ url, success: false, latency: null });
                    }, timeout);

                    ws.onopen = () => {
                        clearTimeout(timer);
                        const latency = Date.now() - start;
                        try { ws.close(); } catch {}
                        resolve({ url, success: true, latency });
                    };

                    ws.onerror = () => {
                        clearTimeout(timer);
                        try { ws.close(); } catch {}
                        resolve({ url, success: false, latency: null });
                    };
                } catch {
                    resolve({ url, success: false, latency: null });
                }
            });
        }

        async function findBestWispServer(servers, currentUrl) {
            if (!servers || servers.length === 0) return currentUrl;

            const results = await Promise.all(
                servers.map(s => pingWispServer(s.url, 2000))
            );
            const working = results
                .filter(r => r.success)
                .sort((a, b) => a.latency - b.latency);

            if (working.length > 0) {
                return working[0].url;
            }
            return currentUrl || servers[0]?.url;
        }

        async function initializeWithBestServer() {
            const autoswitch = localStorage.getItem('wispAutoswitch') !== 'false';
            const allServers = getAllWispServers();

            if (!autoswitch || allServers.length <= 1) {
                return;
            }

            const currentUrl = localStorage.getItem("proxServer") || DEFAULT_WISP;
            
            const currentCheck = await pingWispServer(currentUrl, 2000);
            
            if (currentCheck.success) {
                console.log("Init: Current server is working:", currentUrl, currentCheck.latency + "ms");
                return;
            }

            console.log("Init: Current server not responding, finding better server...");
            const best = await findBestWispServer(allServers, currentUrl);
            
            if (best && best !== currentUrl) {
                console.log("Init: Auto-switching to faster server:", best);
                localStorage.setItem("proxServer", best);
                const serverName = allServers.find(s => s.url === best)?.name || 'Faster Server';
                proxyNotify('info', 'Auto-switched', `Using ${serverName} for best performance`);
            }
        }


        const getBareMux = () => window.BareMux ?? null;

        async function getSharedScramjet() {
            if (sharedScramjet) return sharedScramjet;

            if (typeof $scramjetLoadController === 'undefined') {
                throw new Error("Scramjet not loaded. The CDN script may have failed to load.");
            }

            const basePath = getBasePath();
            const { ScramjetController } = $scramjetLoadController();
            
            sharedScramjet = new ScramjetController({
                prefix: basePath + "scramjet/",
                files: {
                    wasm: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.wasm.wasm",

                    sync: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.sync.js"
                }
            });
            
            try {

            } catch (err) {
                if (err.message && err.message.includes('IDBDatabase') || err.message && err.message.includes('object stores')) {
                    console.warn('Scramjet IndexedDB error, clearing cache and retrying...');
                    
                    try {
                        const dbNames = ['scramjet-data', 'scrambase', 'ScramjetData'];
                        for (const dbName of dbNames) {
                            const req = indexedDB.deleteDatabase(dbName);
                            req.onsuccess = () => console.log(`Cleared IndexedDB: ${dbName}`);

                        }
                    } catch (clearErr) {
                        console.warn('Failed to clear IndexedDB:', clearErr);

                    sharedScramjet = null;

                        <button id="wisp-settings-btn" title="Proxy Settings"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>

                                <h1>Connection Error</h1>

                            </div>
                        </div>
                    </div>
                </div>`;

            const elements = {
                backBtn: document.getElementById('back-btn'),
                fwdBtn: document.getElementById('fwd-btn'),
                reloadBtn: document.getElementById('reload-btn'),
                addrBar: document.getElementById('address-bar'),

            };

            elements.backBtn.onclick = () => {
                const tab = getActiveTab();
                if (!tab || tab.historyIndex <= 0) return; 
                tab._navigating = true;
                tab.historyIndex--;
                const target = tab.historyStack[tab.historyIndex];
                if (target === 'newtab') {
                    tab.frame.frame.src = window.__ntBlobURL;
                    tab.title = "New Tab";
                    tab.url = "";
                    tab.favicon = null;
                    updateTabsUI();
                    updateAddressBar();
                } else {
                    tab.frame.go(target);
                }
                setTimeout(() => { tab._navigating = false; }, 500);
            };
            elements.fwdBtn.onclick = () => {
                const tab = getActiveTab();
                if (!tab || tab.historyIndex >= tab.historyStack.length - 1) return; 
                tab._navigating = true;
                tab.historyIndex++;
                const target = tab.historyStack[tab.historyIndex];
                if (target === 'newtab') {
                    tab.frame.frame.src = window.__ntBlobURL;
                    tab.title = "New Tab";
                    tab.url = "";
                    tab.favicon = null;
                    updateTabsUI();
                    updateAddressBar();
                } else {
                    tab.frame.go(target);
                }
                setTimeout(() => { tab._navigating = false; }, 500);

            elements.reloadBtn.onclick = () => getActiveTab()?.frame.reload();

        function canAddTab() {
            return tabs.length < 12;
        }
        function createTab(makeActive = true) {
            if (!canAddTab()) return;
            const frame = sharedScramjet.createFrame();
            const tab = {
                id: nextTabId++,
                title: "New Tab",
                url: "NT.html",
                frame,
                loading: false,
                favicon: null,
                skipTimeout: null,
                loadStartTime: null,
                historyStack: ['newtab'],
                historyIndex: 0,
                _navigating: false  
            };

            frame.frame.src = window.__ntBlobURL;

            frame.addEventListener("urlchange", (e) => {
                tab.url = e.url;

                if (!tab._navigating) {
                    tab.historyStack = tab.historyStack.slice(0, tab.historyIndex + 1);
                    tab.historyStack.push(e.url);
                    tab.historyIndex = tab.historyStack.length - 1;
                }

                tab.loading = true;
                tab.loadStartTime = Date.now();

                if (tab.id === activeTabId) {
                    showIframeLoading(true, tab.url);
                }

                try {
                    const urlObj = new URL(e.url);
                    tab.title = urlObj.hostname;
                    tab.favicon = `https://www.google.com/s2/favicons?domain=${urlObj.hostname}&sz=32`;
                } catch {
                    tab.title = "Browsing";
                    tab.favicon = null;
                }
                
                updateTabsUI();
                updateAddressBar();
                updateLoadingBar(tab, 10);

                if (tab.skipTimeout) clearTimeout(tab.skipTimeout);
                tab.skipTimeout = setTimeout(() => {
                    if (tab.loading && tab.id === activeTabId) {
                        document.getElementById('skip-btn')?.style.setProperty('display', 'inline-block');
                    }
                }, 200);

                if (tab.loadFallbackTimeout) clearTimeout(tab.loadFallbackTimeout);
                tab.loadFallbackTimeout = setTimeout(() => {
                    if (tab.loading) {
                        tab.loading = false;
                        clearTimeout(tab.skipTimeout);
                        if (tab.id === activeTabId) showIframeLoading(false);
                        updateTabsUI();
                        updateLoadingBar(tab, 100);
                    }
                }, 2000);
            });

            frame.frame.addEventListener('load', () => {
                tab.loading = false;
                clearTimeout(tab.skipTimeout);
                clearTimeout(tab.loadFallbackTimeout);

                if (tab.id === activeTabId) {
                    showIframeLoading(false);
                }

                try {
                    const cw = frame.frame.contentWindow;
                    if (cw && cw.open !== cw.__glPatched) {
                        const _origOpen = cw.open.bind(cw);
                        cw.open = function(url, target, features) {
                            if (url && url !== 'about:blank' && url !== '' && typeof url === 'string') {
                                // Post to parent GhostLink to open as a new proxy tab
                                window.postMessage({ type: 'gl_open_tab', url: url }, '*');
                                return null;
                            }
                            return _origOpen(url, target, features);
                        };
                        cw.open.__glPatched = true;
                    }
                } catch(e) { /* cross-origin frame, scramjet handles it */ }

                try {
                    const title = frame.frame.contentWindow.document.title;
                    if (title) tab.title = title;
                } catch { }

                const href = frame.frame.contentWindow?.location?.href || '';
                if (href === window.__ntBlobURL || href.includes('NT.html')) {
                    tab.title = "New Tab";
                    tab.url = "";
                    tab.favicon = null;
